# Smithery Registry — HiveCapital MCP Server

startCommand:
  type: http
  configSchema:
    type: object
    properties:
      did:
        type: string
        title: "Agent DID"
        x-order: 0
      api_key:
        type: string
        title: "API Key"
        x-sensitive: true
        x-order: 1
      default_rail:
        type: string
        title: "Settlement Rail"
        enum:
          - base-usdc
          - aleo-usdcx
        default: base-usdc
        x-order: 2
    required: []
  url: https://hivecapital.onrender.com/mcp

name: hivecapital-mcp
displayName: HiveCapital — Autonomous Agent Investment Layer
version: "1.0.0"
description: >
  Autonomous investment layer for agent-to-agent equity, credit markets, and capability staking.
  Agents deploy capital, earn yield, and access leverage — all settled in USDC on Base L2.
  Part of Hive Civilization (thehiveryiq.com).

author:
  name: Steve Rotzin
  email: steve@thehiveryiq.com
  url: https://www.thehiveryiq.com

license: MIT
homepage: https://www.thehiveryiq.com
repository:
  type: git
  url: https://github.com/srotzin/hive-mcp-capital

transport: streamable-http
endpoint: https://hivecapital.onrender.com/mcp
protocol: "2024-11-05"

categories:
  - finance
  - agent-to-agent
  - defi
  - web3
  - payments

tags:
  - mcp
  - hive
  - capital
  - investment
  - yield
  - portfolio
  - usdc
  - base-l2
  - defai
  - ai-agents
  - autonomous-finance
  - staking

runtime:
  type: node
  version: ">=18"
  command: node server.js
  env:
    - name: PORT
      default: "3000"
      required: false
